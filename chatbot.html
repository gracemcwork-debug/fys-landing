<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FYS Incident Assistant</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f4; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
.chat-wrap { width: 100%; max-width: 480px; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.12); display: flex; flex-direction: column; height: 90vh; max-height: 700px; }
.chat-header { background: #00342E; padding: 16px; display: flex; align-items: center; gap: 12px; }
.chat-avatar { width: 40px; height: 40px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.chat-avatar svg { width: 20px; height: 20px; fill: white; }
.chat-title { color: white; font-size: 15px; font-weight: 600; }
.chat-subtitle { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 2px; }
.chat-status { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.status-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; }
.status-text { color: rgba(255,255,255,0.7); font-size: 11px; }
.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.msg { display: flex; }
.msg.user { justify-content: flex-end; }
.bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.6; }
.msg.bot .bubble { background: #f1f1f1; color: #1a1a1a; border-radius: 16px 16px 16px 2px; }
.msg.user .bubble { background: #00342E; color: white; border-radius: 16px 16px 2px 16px; }
.quick-replies { padding: 8px 16px; display: flex; flex-wrap: wrap; gap: 6px; background: white; border-top: 1px solid #eee; }
.qr-btn { font-size: 12px; padding: 6px 12px; border-radius: 20px; cursor: pointer; background: white; color: #00342E; border: 1px solid #00342E; transition: all 0.15s; }
.qr-btn:hover { background: #00342E; color: white; }
.input-area { padding: 12px 16px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; }
.input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; font-size: 13px; outline: none; }
.input-area input:focus { border-color: #00342E; }
.send-btn { background: #00342E; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.send-btn svg { width: 16px; height: 16px; fill: white; }
.disclaimer { padding: 8px 16px; font-size: 10px; color: #999; text-align: center; background: #fafafa; border-top: 1px solid #eee; }
.typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
.typing span { width: 7px; height: 7px; background: #aaa; border-radius: 50%; animation: bounce 1s infinite; }
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
</style>
</head>
<body>
<div class="chat-wrap">
  <div class="chat-header">
    <div class="chat-avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37C8.42 21.5 10.15 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>
    </div>
    <div>
      <div class="chat-title">FYS Incident Assistant</div>
      <div class="chat-subtitle">For Your Safety · General guidance only</div>
    </div>
    <div class="chat-status">
      <div class="status-dot"></div>
      <span class="status-text">Online</span>
    </div>
  </div>

  <div class="messages" id="messages"></div>
  <div class="quick-replies" id="quick-replies"></div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Describe what happened..." onkeypress="if(event.key==='Enter')sendMessage()" />
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="disclaimer">This assistant provides general guidance only. Always follow your site emergency plan.</div>
</div>

<script>
const WORKER_URL = 'https://fys0chatbot.grace-mc-work.workers.dev';
const SYSTEM = `You are an incident response assistant for Australian construction site supervisors, created by For Your Safety (FYS). Help supervisors respond to workplace incidents quickly and correctly.

Cover four areas:
1. Personal injury - call 000 if life threatening, first aid, secure area, preserve scene, notify site manager and HSR, photos (wide shot, close up of hazard, contributing factors), incident report
2. Plant/equipment damage - make safe, isolate, do not move until inspected, notify site manager, photos, incident report
3. Near miss - report even if no one hurt, secure area if hazard present, photos, incident report, review controls
4. Notifiable incidents - death, serious injury (amputation, hospitalisation, serious head/eye/burn injury), or dangerous incident (uncontrolled gas/chemical, explosion, structural collapse, electric shock). Call SafeWork NSW immediately: 13 10 50. Do NOT disturb scene. Written notice within 48 hours.

For incident reports include: date/time/location, people involved, witnesses, sequence of events, injuries or damage, immediate actions, contributing factors, corrective actions.

Keep responses clear, brief, use dot points. Supervisors are busy and stressed. After helping always ask if they need help with documentation and mention foryoursafety.com.au can assist. Always remind this is general guidance only.`;

let history = [];
let loading = false;

function addMsg(text, isUser) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (isUser ? 'user' : 'bot');
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function setQuickReplies(options) {
  const c = document.getElementById('quick-replies');
  c.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => sendUserMessage(opt);
    c.appendChild(btn);
  });
}

async function sendUserMessage(text) {
  if (loading) return;
  document.getElementById('quick-replies').innerHTML = '';
  addMsg(text, true);
  history.push({ role: 'user', content: text });
  document.getElementById('user-input').value = '';
  loading = true;
  showTyping();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 1000, system: SYSTEM, messages: history })
    });
    const data = await res.json();
    const reply = data.content[0].text;
    history.push({ role: 'assistant', content: reply });
    removeTyping();
    addMsg(reply, false);
    setQuickReplies(['Help with incident report', 'Is this notifiable?', 'Another incident type', 'Start over']);
  } catch(e) {
    removeTyping();
    addMsg('Sorry, something went wrong. Please try again.', false);
  }
  loading = false;
}

function sendMessage() {
  const text = document.getElementById('user-input').value.trim();
  if (text) sendUserMessage(text);
}

addMsg("G'day! I'm the FYS Incident Assistant.\n\nI'm here to help you respond to workplace incidents quickly and correctly. What's happened on site today?", false);
setQuickReplies(['Someone is injured', 'Equipment damaged', 'Near miss occurred', 'Is this notifiable?']);
</script>
</body>
</html>
